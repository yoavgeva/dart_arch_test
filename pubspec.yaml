name: dart_arch_test
description: >-
  ArchUnit-inspired architecture testing for Dart & Flutter. Enforce
  layer boundaries, slice isolation, cycles, coupling metrics, and
  violation baselines — all in plain Dart tests.
version: 0.2.0
repository: https://github.com/yoavgeva/dart_arch_test
issue_tracker: https://github.com/yoavgeva/dart_arch_test/issues

environment:
  sdk: ^3.11.0

topics:
  - testing
  - architecture
  - linting
  - static-analysis

dependencies:
  analyzer: ">=7.0.0 <12.0.0"
  collection: ^1.19.0
  path: ^1.9.0

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ^10.2.0
